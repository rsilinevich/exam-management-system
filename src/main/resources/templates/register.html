<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register | Exam Management</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-50 flex items-center justify-center min-h-screen font-sans antialiased">

<div class="w-full max-w-md bg-white p-8 rounded-2xl border border-gray-200 shadow-sm">

    <div class="mb-8 text-center">
        <h2 class="text-2xl font-bold text-gray-800 tracking-tight">Create an Account</h2>
        <p class="text-sm text-gray-500 mt-1">Join the Exam Management System</p>
    </div>

    <form th:action="@{/register}" method="post" class="space-y-5">

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
            <input type="text"
                   name="username"
                   required
                   class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-gray-400 focus:border-transparent text-sm">
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
            <input type="email"
                   name="email"
                   class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-gray-400 focus:border-transparent text-sm">
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
            <input type="password"
                   name="password"
                   required
                   class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-gray-400 focus:border-transparent text-sm">
        </div>

        <div th:if="${param.error}"
             class="text-sm text-red-600 bg-red-50 p-3 rounded-lg border border-red-100 text-center">
            Username is already taken.
        </div>

        <button type="submit"
                class="w-full bg-gray-900 hover:bg-gray-800 text-white font-medium py-2 rounded-lg text-sm transition-colors cursor-pointer">
            Register
        </button>
    </form>

    <div class="mt-6 text-center border-t border-gray-100 pt-4">
        <p class="text-sm text-gray-500">
            Already have an account?
            <a th:href="@{/login}" class="font-medium text-gray-700 hover:underline">Sign in here</a>
        </p>
    </div>

</div>

</body>
</html>
