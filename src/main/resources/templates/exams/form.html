<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Exam Form | Exam Management</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-50 flex items-center justify-center min-h-screen font-sans antialiased">

<div class="w-full max-w-md bg-white p-8 rounded-2xl border border-gray-200 shadow-sm">

    <h2 class="text-2xl font-bold text-gray-800 mb-2 tracking-tight"
        th:text="${exam.id == null} ? 'Create Exam' : 'Edit Exam'">
        Exam Form
    </h2>

    <p class="text-sm text-gray-500 mb-6">
        Enter exam details below.
    </p>

    <form th:action="${exam.id == null} ?   @{/exams} : @{/exams/update/{id}(id=${exam.id})}"
          th:object="${exam}"
          method="post"
          class="space-y-5">

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Title</label>
            <input type="text"
                   th:field="*{title}"
                   required
                   class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-gray-900">

            <p th:if="${#fields.hasErrors('title')}"
               th:errors="*{title}"
               class="text-xs text-red-500 mt-1">
                Title error
            </p>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Professor</label>
            <input type="text"
                   th:field="*{professor}"
                   required
                   class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-gray-900">

            <p th:if="${#fields.hasErrors('professor')}"
               th:errors="*{professor}"
               class="text-xs text-red-500 mt-1">
                Professor error
            </p>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Date</label>
            <input type="date"
                   th:field="*{date}"
                   required
                   class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-gray-900">

            <p th:if="${#fields.hasErrors('date')}"
               th:errors="*{date}"
               class="text-xs text-red-500 mt-1">
                Date error
            </p>
        </div>

        <div class="flex gap-4 pt-2">
            <a th:href="@{/exams}"
               class="w-1/3 text-center bg-gray-100 hover:bg-gray-200 text-gray-800 font-medium py-2 rounded-lg text-sm transition-colors">
                Cancel
            </a>

            <button type="submit"
                    class="w-2/3 bg-gray-900 hover:bg-gray-800 text-white font-medium py-2 rounded-lg text-sm transition-colors cursor-pointer">
                Save Exam
            </button>
        </div>

    </form>

</div>

</body>
</html>
