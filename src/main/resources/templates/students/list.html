<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Students | Exam Management</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-50 text-gray-900 font-sans antialiased">

<nav class="bg-white border-b border-gray-200 px-8 py-4 flex justify-between items-center shadow-xs">
    <a th:href="@{/}" class="text-xl font-semibold tracking-tight text-gray-800">
        Exam Management System
    </a>

    <div class="flex items-center gap-6">
        <a th:href="@{/}" class="text-sm font-medium text-gray-600 hover:text-gray-900">Dashboard</a>
        <a th:href="@{/exams}" class="text-sm font-medium text-gray-600 hover:text-gray-900">Exams</a>
        <a th:href="@{/profile}" class="text-sm font-medium text-gray-600 hover:text-gray-900">Profile</a>

        <form th:action="@{/logout}" method="post">
            <button type="submit"
                    class="text-sm font-medium text-red-600 hover:text-red-700 cursor-pointer bg-transparent border-0">
                Logout
            </button>
        </form>
    </div>
</nav>

<main class="max-w-5xl mx-auto mt-12 px-4">

    <div class="flex justify-between items-center mb-6">
        <div>
            <h2 class="text-2xl font-bold text-gray-800 tracking-tight">Students</h2>
            <p class="text-sm text-gray-500 mt-1">Manage student records</p>
        </div>

        <a th:href="@{/students/new}"
           class="bg-gray-900 hover:bg-gray-800 text-white px-4 py-2 rounded-xl text-sm font-medium transition-colors shadow-xs">
            + Add Student
        </a>
    </div>

    <div class="bg-white rounded-xl border border-gray-200 shadow-xs overflow-hidden">
        <table class="w-full text-left border-collapse">
            <thead>
            <tr class="bg-gray-50 border-b border-gray-200">
                <th class="p-4 text-xs font-semibold text-gray-500 uppercase tracking-wider">ID</th>
                <th class="p-4 text-xs font-semibold text-gray-500 uppercase tracking-wider">Name</th>
                <th class="p-4 text-xs font-semibold text-gray-500 uppercase tracking-wider">Email</th>
                <th class="p-4 text-xs font-semibold text-gray-500 uppercase tracking-wider text-right">Actions</th>
            </tr>
            </thead>

            <tbody class="divide-y divide-gray-100">

            <tr th:each="student : ${students}" class="hover:bg-gray-50/50 transition-colors">
                <td class="p-4 text-sm text-gray-500" th:text="${student.id}">1</td>
                <td class="p-4 text-sm font-medium text-gray-900" th:text="${student.name}">Student Name</td>
                <td class="p-4 text-sm text-gray-600" th:text="${student.email}">student@example.com</td>

                <td class="p-4 text-sm text-right">
                    <div class="flex justify-end items-center gap-3">
                        <a th:href="@{/students/edit/{id}(id=${student.id})}"
                           class="text-gray-600 hover:text-gray-900 font-medium text-xs">
                            Edit
                        </a>

                        <form th:action="@{/students/delete/{id}(id=${student.id})}"
                              method="post"
                              sec:authorize="hasRole('ADMIN')"
                              onsubmit="return confirm('Delete this student? This is only possible if they are not used in records.');">
                            <button type="submit"
                                    class="text-red-600 hover:text-red-700 font-medium text-xs bg-transparent border-0 cursor-pointer">
                                Delete
                            </button>
                        </form>
                    </div>
                </td>
            </tr>

            <tr th:if="${#lists.isEmpty(students)}">
                <td colspan="4" class="p-12 text-center text-sm text-gray-400 italic">
                    No students found.
                </td>
            </tr>

            </tbody>
        </table>
    </div>

</main>

</body>
</html>
