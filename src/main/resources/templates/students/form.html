<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Student Form | Exam Management</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-50 flex items-center justify-center min-h-screen font-sans antialiased">

<div class="w-full max-w-md bg-white p-8 rounded-2xl border border-gray-200 shadow-sm">

    <h2 class="text-2xl font-bold text-gray-800 mb-2 tracking-tight"
        th:text="${student.id == null} ? 'Create Student' : 'Edit Student'">
        Student Form
    </h2>

    <p class="text-sm text-gray-500 mb-6">
        Enter student details below.
    </p>

    <form th:action="${student.id == null} ? @{/students} : @{/students/update/{id}(id=${student.id})}"
          th:object="${student}"
          method="post"
          class="space-y-5">

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Name</label>
            <input type="text"
                   th:field="*{name}"
                   required
                   class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-gray-900">

            <p th:if="${#fields.hasErrors('name')}"
               th:errors="*{name}"
               class="text-xs text-red-500 mt-1">
                Name error
            </p>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
            <input type="email"
                   th:field="*{email}"
                   required
                   class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-gray-900">

            <p th:if="${#fields.hasErrors('email')}"
               th:errors="*{email}"
               class="text-xs text-red-500 mt-1">
                Email error
            </p>
        </div>

        <div class="flex gap-4 pt-2">
            <a th:href="@{/students}"
               class="w-1/3 text-center bg-gray-100 hover:bg-gray-200 text-gray-800 font-medium py-2 rounded-lg text-sm transition-colors">
                Cancel
            </a>

            <button type="submit"
                    class="w-2/3 bg-gray-900 hover:bg-gray-800 text-white font-medium py-2 rounded-lg text-sm transition-colors cursor-pointer">
                Save Student
            </button>
        </div>

    </form>

</div>

</body>
</html>
