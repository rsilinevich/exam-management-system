<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Profile | Exam Management</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-50 text-gray-900 font-sans antialiased">

<nav class="bg-white border-b border-gray-200 px-8 py-4 flex justify-between items-center shadow-xs">
    <a th:href="@{/}" class="text-xl font-semibold tracking-tight text-gray-800">
        Exam Management System
    </a>

    <a th:href="@{/}" class="text-sm font-medium text-gray-600 hover:text-gray-900">
        Back to Dashboard
    </a>
</nav>

<main class="max-w-md mx-auto mt-16 px-4">

    <div class="bg-white p-8 rounded-2xl border border-gray-200 shadow-sm">

        <h2 class="text-2xl font-bold text-gray-800 mb-1 tracking-tight">Account Profile</h2>
        <p class="text-sm text-gray-500 mb-6">Update your account information</p>

        <form th:action="@{/profile/update}" method="post" class="space-y-5">

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                <input type="text"
                       th:value="${user.username}"
                       disabled
                       class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm bg-gray-50 text-gray-400 cursor-not-allowed">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Role</label>
                <input type="text"
                       th:value="${user.role}"
                       disabled
                       class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm bg-gray-50 text-gray-400 cursor-not-allowed">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                <input type="email"
                       name="email"
                       th:value="${user.email}"
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-gray-900">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Change Password</label>
                <input type="password"
                       name="newPassword"
                       placeholder="Leave blank to keep current password"
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-gray-900">
            </div>

            <div th:if="${param.success}"
                 class="text-sm text-green-600 bg-green-50 p-3 rounded-lg border border-green-100 text-center">
                Profile saved successfully.
            </div>

            <button type="submit"
                    class="w-full bg-gray-900 hover:bg-gray-800 text-white font-medium py-2 rounded-lg text-sm transition-colors cursor-pointer">
                Save Changes
            </button>

        </form>

    </div>

</main>

</body>
</html>
