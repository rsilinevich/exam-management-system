<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Error | Exam Management</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-50 flex items-center justify-center min-h-screen font-sans antialiased">

<div class="w-full max-w-lg bg-white p-8 rounded-2xl border border-gray-200 shadow-sm text-center">

    <h1 class="text-2xl font-bold text-gray-800 mb-2">Something went wrong</h1>

    <p class="text-sm text-gray-500 mb-6"
       th:text="${errorMessage != null} ? ${errorMessage} : 'An unexpected error occurred.'">
        Error message
    </p>

    <a th:href="@{/}"
       class="inline-block bg-gray-900 hover:bg-gray-800 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors">
        Back to Dashboard
    </a>

</div>

</body>
</html>
